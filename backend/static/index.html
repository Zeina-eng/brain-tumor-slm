<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Medical Summarizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="glow-sphere sphere-1"></div>
    <div class="glow-sphere sphere-2"></div>

    <main class="container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <h1>AI Document Summarizer</h1>
            <p>Advanced AI model designed to generate concise and accurate summaries of any text or document.</p>
        </header>

        <div class="card glass">
            <div class="tabs">
                <button class="tab-btn active" data-tab="text">Text Input</button>
                <button class="tab-btn" data-tab="file">File Upload</button>
            </div>

            <div class="action-selector">
                <label for="action-type">Choose Action</label>
                <div class="action-options">
                    <button class="action-btn active" data-action="summarize">Summarize</button>
                    <button class="action-btn" data-action="generate">Generate Text</button>
                </div>
            </div>

            <div class="tab-content active" id="text-tab">
                <div class="input-group">
                    <label for="raw-text">Paste Text or Document Content</label>
                    <textarea id="raw-text" placeholder="Start typing or paste text here..."></textarea>
                </div>
            </div>

            <div class="tab-content" id="file-tab">
                <div class="input-group">
                    <label>Upload Document (.txt or .pdf)</label>
                    <div class="drop-zone" id="drop-zone">
                        <svg class="upload-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        <p>Drag & Drop your file here</p>
                        <span class="or">or</span>
                        <button class="btn-secondary" onclick="document.getElementById('file-input').click()">Browse Files</button>
                        <input type="file" id="file-input" hidden accept=".txt,.pdf">
                        <p class="file-name" id="file-name"></p>
                    </div>
                </div>
            </div>

            <button class="btn-primary" id="summarize-btn">
                <span>Generate Summary</span>
                <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </button>
        </div>

        <div class="card glass result-card hidden" id="result-container">
            <div class="result-header">
                <h2>Generated Summary</h2>
                <button class="icon-btn copy-btn" id="copy-btn" title="Copy to clipboard">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                </button>
            </div>
            <div class="result-content" id="summary-output"></div>
        </div>
    </main>

    <div class="overlay hidden" id="loading-overlay">
        <div class="loader">
            <div class="spinner"></div>
            <p>Analyzing document...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
